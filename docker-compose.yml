version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: moodflow-db
    environment:
      POSTGRES_USER: moodflow_user
      POSTGRES_PASSWORD: moodflow_password
      POSTGRES_DB: moodflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: moodflow-storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_user
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  minio_data:
